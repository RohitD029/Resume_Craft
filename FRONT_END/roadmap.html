<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ed;
    --surface: #ffffff;
    --surface2: #faf8f5;
    --border: #e8e2d9;
    --text: #1a1714;
    --text-muted: #7a7068;
    --accent-aiml: #e8611a;
    --accent-web: #1a6ee8;
    --accent-dsa: #8b1ae8;
    --accent-ds: #0aaa6e;
    --accent-devops: #e8a01a;
    --accent-android: #1ae8c8;
    --accent-cyber: #e81a4a;
    --done-bg: #edfaf4;
    --done-border: #0aaa6e;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.07);
    --shadow-hover: 0 12px 40px rgba(0,0,0,0.13);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: whitesmoke;
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    padding: 52px 60px 36px;
    max-width: 1400px;
    margin: 0 auto;
  }
  header .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 5vw, 62px);
    font-weight: 800;
    line-height: 1.05;
    color: blue;
  }
  header h1 span { color: var(--accent-aiml); }
  header p.subtitle {
    margin-top: 14px;
    font-size: 16px;
    color: var(--text-muted);
    max-width: 600px;
    line-height: 1.6;
  }

  /* ─── CARDS GRID ─── */
  .cards-section {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 60px 80px;
  }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 32px 28px 28px;
    cursor: pointer;
    transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s ease, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-hover);
    border-color: var(--accent);
  }
  .card-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .card p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.55;
    margin-bottom: 20px;
  }
  .card-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 100px;
    background: color-mix(in srgb, var(--accent) 10%, transparent);
    color: var(--accent);
    border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
  }
  .card-arrow {
    position: absolute;
    bottom: 28px; right: 28px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--accent) 12%, transparent);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    font-size: 16px;
    transition: background 0.2s, transform 0.2s;
  }
  .card:hover .card-arrow {
    background: var(--accent);
    color: #fff;
    transform: rotate(45deg);
  }

  /* ─── ROADMAP MODAL ─── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.45);
    backdrop-filter: blur(4px);
    z-index: 100;
    overflow-y: auto;
    padding: 32px 20px;
  }
  .overlay.active { display: flex; justify-content: center; align-items: flex-start; }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    width: 100%;
    max-width: 820px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.18);
    animation: slideUp 0.3s cubic-bezier(.34,1.3,.64,1);
    overflow: hidden;
  }
  @keyframes slideUp {
    from { opacity:0; transform: translateY(40px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .modal-header {
    padding: 36px 40px 24px;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 20px;
    position: relative;
  }
  .modal-icon {
    width: 60px; height: 60px;
    border-radius: 14px;
    background: color-mix(in srgb, var(--modal-accent) 14%, transparent);
    display: flex; align-items: center; justify-content: center;
    font-size: 30px;
    flex-shrink: 0;
  }
  .modal-title h2 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
  }
  .modal-title p {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .modal-close {
    position: absolute;
    top: 28px; right: 32px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
  }
  .modal-close:hover { background: var(--text); color: #fff; }

  .modal-body { padding: 32px 40px 40px; }

  /* ─── PHASES ─── */
  .phase {
    margin-bottom: 36px;
  }
  .phase-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }
  .phase-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--modal-accent);
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .phase-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
  }
  .phase-duration {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 100px;
    white-space: nowrap;
  }

  .topics-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .topic-tag {
    font-size: 13px;
    padding: 6px 13px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    transition: border-color 0.15s, background 0.15s;
  }
  .topic-tag:hover {
    border-color: var(--modal-accent);
    background: color-mix(in srgb, var(--modal-accent) 7%, white);
  }

  /* connector line */
  .phase:not(:last-child)::after {
    content: '';
    display: block;
    width: 2px;
    height: 20px;
    background: var(--border);
    margin: 16px 0 0 15px;
  }

  /* ─── RESOURCES ─── */
  .resources-section {
    margin-top: 8px;
    padding-top: 28px;
    border-top: 1.5px solid var(--border);
  }
  .resources-section h3 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .resource-links {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .resource-link {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .resource-link:hover {
    border-color: var(--modal-accent);
    color: var(--modal-accent);
    background: color-mix(in srgb, var(--modal-accent) 6%, white);
  }
  .resource-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--modal-accent);
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    header { padding: 36px 24px 24px; }
    .cards-section { padding: 0 24px 60px; }
    .modal-header, .modal-body { padding: 24px; }
  }
</style>
</head>

// ─── RENDER CARDS ───
const grid = document.getElementById('cardsGrid');
courses.forEach(c => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--accent', c.accent);
  card.innerHTML = `
    <div class="card-icon">${c.icon}</div>
    <h2>${c.title}</h2>
    <p>${c.desc}</p>
    <div class="card-meta">
      ${c.badges.map(b => `<span class="badge">${b}</span>`).join('')}
    </div>
    <div class="card-arrow">→</div>
  `;
  card.addEventListener('click', () => openModal(c));
  grid.appendChild(card);
});

// ─── MODAL ───
function openModal(c) {
  document.getElementById('modalIcon').textContent = c.icon;
  document.getElementById('modalIcon').style.setProperty('--modal-accent', c.accent);
  document.getElementById('modalTitle').textContent = c.title;
  document.getElementById('modalSubtitle').textContent = c.subtitle;

  const body = document.getElementById('modalBody');
  body.style.setProperty('--modal-accent', c.accent);

  let html = '';
  c.phases.forEach(p => {
    html += `
      <div class="phase">
        <div class="phase-header">
          <div class="phase-num" style="background:${c.accent}">${p.num}</div>
          <span class="phase-title">${p.title}</span>
          <span class="phase-duration">${p.duration}</span>
        </div>
        <div class="topics-list">
          ${p.topics.map(t => `<span class="topic-tag">${t}</span>`).join('')}
        </div>
      </div>
    `;
  });

  html += `
    <div class="resources-section" style="--modal-accent:${c.accent}">
      <h3>📚 Recommended Resources</h3>
      <div class="resource-links">
        ${c.resources.map(r => `
          <a class="resource-link" href="${r.url}" target="_blank" rel="noopener" style="--modal-accent:${c.accent}">
            <span class="resource-dot" style="background:${c.accent}"></span>
            ${r.name}
          </a>
        `).join('')}
      </div>
    </div>
  `;

  body.innerHTML = html;
  document.getElementById('overlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() {
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow = '';
}
</script>
