<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus connect | signup</title>
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>
    <div class="registercontainer">
        <h2>Create Account</h2>

        <form>
            <input type="text" placeholder="Full name" required>
            <input type="text" placeholder="Username" required>
            
            <div style="position: relative; margin: 10px 0;">
                <input type="password" id="reg-password" placeholder="Password" required style="margin: 0; padding-right: 40px;">
                <span id="togglePassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px;" title="Toggle Password Visibility">👁️</span>
            </div>

            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="Enter College Name" required>

            <select id="role" required>
                <option value="">Select Year</option>
                <option>First Year</option>
                <option>Second Year</option>
                <option>Third Year</option>
                <option>Final Year</option>
            </select>

            <input type="number" placeholder="Enter phone number" required>

            <button type="submit">Register</button>
        </form>

        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const password = document.getElementById('reg-password');

        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });
    </script>
    <script src="../js/Auth.js"></script>
</body>

</html>
